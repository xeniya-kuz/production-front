name: linting, testing, building
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
permissions:
    contents: write
    pages: write
    id-token: write
concurrency:
    group: 'pages'
    cancel-in-progress: true
jobs:
    build-and-ui-testing:
        runs-on: windows-latest
        concurrency: ci-${{ github.ref }}
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        strategy:
            matrix:
                node-version: [20.x]
        steps:
            - uses: actions/checkout@v4
            - name: Staring Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
            - name: install modules
              run: npm ci
            - name: production build
              run: npm run build:prod
              if: always()
            - name: Build storybook
              run: npm run storybook:build
              if: always()
            - name: Screenshot testing
              run: npm run test:ui:ci
              if: always()
            - name: unit testing
              run: npm run test:unit
            - name: generate HTML report
              run: npm run test:ui:report
              if: always()
            - name: move .loki to reports/loki
              run: mv .loki reports/loki
              if: always()
            - name: upload reports artifact on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: reports-artifact
                path: reports
                overwrite: true
                include-hidden-files: true
            - name: setup Pages
              uses: actions/configure-pages@v2
              if: always()
            - name: upload artifact
              uses: actions/upload-pages-artifact@v4
              if: always()
              with:
                  path: 'reports'
            - name: deploy to GitHub Pages
              id: deployment
              if: always()
              uses: actions/deploy-pages@v4

    checks:
        runs-on: windows-latest
        strategy:
            matrix:
                node-version: [20.x]
        steps:
            - uses: actions/checkout@v4
            - name: Staring Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
            - name: install modules
              run: npm ci
            - name: fix linting typescript
              run: npm run lint:ts:fix
              if: always()
            - name: fix linting scss
              run: npm run lint:scss:fix
